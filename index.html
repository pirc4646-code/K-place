<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>K/place</title>
<style>
  :root{
    --point:#2E3192;
    --point-soft:#E9EAF7;
    --white:#FFFFFF;
    --ink:#1A1A1A;
    --dim:#7A7CA8;
    --notch:22px;   /* 큰 패널의 삼각형 깊이 */
    --notch-s:12px; /* 작은 버튼의 삼각형 깊이 */
    --spring:cubic-bezier(0.22, 1.35, 0.36, 1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:#EFEFF2;color:var(--ink)}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}

  #cv{position:fixed;inset:0;display:block;touch-action:none;image-rendering:pixelated}
  #cv.painting{cursor:crosshair}

  /* ══ 육각형(양끝 삼각형) 패널: 테두리 유지를 위해 2겹 구조 ══
     .hexp(바깥, 포인트색) > .hexp-in(안쪽, 흰색) */
  .hexp{
    background:var(--point);padding:3px;
    clip-path:polygon(var(--notch) 0, calc(100% - var(--notch)) 0, 100% 50%, calc(100% - var(--notch)) 100%, var(--notch) 100%, 0 50%);
  }
  .hexp-in{
    background:var(--white);width:100%;height:100%;
    clip-path:polygon(var(--notch) 0, calc(100% - var(--notch)) 0, 100% 50%, calc(100% - var(--notch)) 100%, var(--notch) 100%, 0 50%);
    padding:8px calc(var(--notch) + 14px);
  }
  .hexshadow{filter:drop-shadow(4px 4px 0 rgba(46,49,146,.30))}

  /* 작은 육각형 버튼/칩 (단색) */
  .hex{
    display:inline-block;
    clip-path:polygon(var(--notch-s) 0, calc(100% - var(--notch-s)) 0, 100% 50%, calc(100% - var(--notch-s)) 100%, var(--notch-s) 100%, 0 50%);
    padding:7px 22px;font-size:13px;
  }
  .hexwrap{filter:drop-shadow(3px 3px 0 rgba(46,49,146,.30));display:inline-block}
  .hex.fill{background:var(--point);color:var(--white);font-weight:800}
  .hex.soft{background:var(--point-soft);color:var(--point);font-weight:700}
  .hex.white{background:var(--white);color:var(--point);font-weight:700}
  button.hex:active{transform:scale(.94)}

  /* ── 상단 바 (육각형 패널) ── */
  #topbarWrap{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:20;
    width:min(96vw, 1100px);
    animation:slideDown .5s var(--spring) both;
  }
  .topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .logo{
    font-size:clamp(24px,5vw,42px);font-weight:900;font-style:italic;
    letter-spacing:-1px;color:var(--point);line-height:1;
    user-select:none;white-space:nowrap;
  }
  .logo span{color:var(--ink)}
  .crumb{font-size:13px;color:var(--dim)}
  .crumb b{color:var(--point)}
  .spacer{flex:1}
  .chip{font-variant-numeric:tabular-nums;padding:5px 16px;font-size:12px}
  #floorTabs{display:none;gap:2px;flex-wrap:wrap}
  #floorTabs .hex{padding:5px 16px;font-size:12px}

  /* ── 하단 UI 스택 ── */
  #bottomUI{
    position:fixed;bottom:max(14px, env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:20;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    width:min(96vw,640px);pointer-events:none;
  }
  #bottomUI > *{pointer-events:auto}

  #paletteWrap{display:none;width:100%}
  #paletteWrap.show{display:block;animation:slideUp .45s var(--spring) both}
  #paletteWrap .hexp-in{display:flex;flex-direction:column;gap:8px;padding-top:12px;padding-bottom:12px}
  .swatches{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
  .sw{width:26px;height:26px;border:2px solid #C9CAE4;cursor:pointer}
  .sw.sel{border-color:var(--point);outline:3px solid var(--point);outline-offset:1px}
  .sw.eraser{
    background:
      linear-gradient(45deg,#eee 25%,transparent 25%,transparent 75%,#eee 75%),
      linear-gradient(45deg,#eee 25%,#fff 25%,#fff 75%,#eee 75%);
    background-size:10px 10px;background-position:0 0,5px 5px;
    display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--point);font-weight:800
  }
  .palette-info{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--dim);font-size:11px;text-align:center}

  #paintRow{display:none;gap:8px;align-items:center}
  #paintRow.show{display:flex;animation:slideUp .45s var(--spring) both}
  #paintBtn{font-size:16px;padding:12px 34px}
  #cancelBtn{display:none;padding:10px 24px}
  #cancelBtn.show{display:inline-block}

  /* 줌 안내 (육각형 패널) */
  #zoomHint{
    position:fixed;bottom:max(18px, env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:15;
    display:none;width:min(92vw,420px);
  }
  #zoomHint.show{display:block;animation:slideUp .45s var(--spring) both}
  #zoomHint .hexp-in{font-size:13px;text-align:center;padding-top:10px;padding-bottom:10px}
  #zoomHint b{color:var(--point)}

  /* ── 실내 입장 모달 (육각형 카드) ── */
  #zoneModal{
    position:fixed;inset:0;z-index:40;display:none;
    align-items:center;justify-content:center;
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    padding:16px;
  }
  #zoneModal.show{display:flex}
  #zmCard{width:min(92vw,400px);animation:popIn .4s var(--spring) both}
  #zmCard .hexp-in{padding-top:18px;padding-bottom:18px}
  .zm-title{font-size:14px;color:var(--dim);font-weight:700;margin-bottom:4px;text-align:center}
  .zm-name{font-size:26px;font-weight:900;color:var(--point);margin-bottom:10px;text-align:center}
  .zm-photo{width:100%;aspect-ratio:16/9;object-fit:cover;border:2px solid var(--point-soft);margin-bottom:10px;display:none;background:#F5F5F8}
  .zm-desc{font-size:13px;line-height:1.6;margin-bottom:16px;white-space:pre-line;text-align:center}
  .zm-btns{display:flex;justify-content:center;gap:8px}

  /* 공유 모드 안내 배너 */
  #shareBanner{
    position:fixed;top:calc(10px + 74px);left:50%;transform:translateX(-50%);z-index:19;
    display:none;width:min(94vw,560px);
  }
  #shareBanner.show{display:block;animation:slideDown .5s var(--spring) both}
  #shareBanner .hexp-in{font-size:12px;text-align:center;padding-top:8px;padding-bottom:8px;color:var(--dim)}
  #shareBanner b{color:var(--point)}

  /* 토스트 */
  #toast{
    position:fixed;top:90px;left:50%;transform:translateX(-50%);z-index:50;
    background:var(--point);color:var(--white);padding:9px 26px;font-size:13px;font-weight:700;
    display:none;clip-path:polygon(var(--notch-s) 0, calc(100% - var(--notch-s)) 0, 100% 50%, calc(100% - var(--notch-s)) 100%, var(--notch-s) 100%, 0 50%)
  }
  #toast.show{display:block;animation:popIn .35s var(--spring) both}

  @keyframes slideDown{ from{transform:translate(-50%,-180%)} to{transform:translate(-50%,0)} }
  @keyframes slideUp{ from{transform:translateY(180px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes popIn{ from{transform:scale(.75);opacity:0} to{transform:scale(1);opacity:1} }

  /* ── 모바일 ── */
  @media (max-width:640px){
    :root{--notch:16px}
    #coordChip{display:none}
    .crumb{display:none}
    .topbar{gap:6px}
    .hexp-in{padding-left:calc(var(--notch) + 10px);padding-right:calc(var(--notch) + 10px)}
    .sw{width:34px;height:34px}
    .swatches{gap:6px}
    #paintBtn{padding:14px 36px;font-size:17px}
    .palette-info span{font-size:10px}
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none!important;animation:none!important} }
</style>
</head>
<body>

<canvas id="cv"></canvas>

<div id="topbarWrap" class="hexshadow"><div class="hexp"><div class="hexp-in topbar">
  <span class="logo">K<span>/</span>place</span>
  <span class="crumb" id="crumb">전체 지도</span>
  <span class="hexwrap"><button class="hex soft" id="backBtn" style="display:none">← 지도로</button></span>
  <div id="floorTabs"></div>
  <span class="spacer"></span>
  <span class="hexwrap"><span class="hex soft chip" id="coordChip" title="마우스가 있는 칸의 좌표 (구역 설정에 사용)">-, -</span></span>
  <span class="hexwrap"><span class="hex soft chip" id="zoomChip">100%</span></span>
</div></div></div>

<div id="shareBanner"><div class="hexp"><div class="hexp-in" id="shareBannerText"></div></div></div>

<div id="zoomHint" class="hexshadow"><div class="hexp"><div class="hexp-in">
  <b>스크롤/핀치로 확대</b>하면 픽셀이 나타납니다<br>건물을 클릭하면 실내로 들어갑니다
</div></div></div>

<div id="bottomUI">
  <div id="paletteWrap" class="hexshadow"><div class="hexp"><div class="hexp-in">
    <div class="swatches" id="swatches"></div>
    <div class="palette-info"><span id="paletteHelp"></span></div>
  </div></div></div>
  <div id="paintRow">
    <span class="hexwrap"><button class="hex fill" id="paintBtn">🖌 페인트</button></span>
    <span class="hexwrap"><button class="hex white" id="cancelBtn">✕ 취소</button></span>
  </div>
</div>

<div id="zoneModal">
  <div id="zmCard" class="hexshadow"><div class="hexp"><div class="hexp-in">
    <div class="zm-title">어디에 입장하시겠습니까?</div>
    <div class="zm-name" id="zmName"></div>
    <img class="zm-photo" id="zmPhoto" alt="">
    <div class="zm-desc" id="zmDesc"></div>
    <div class="zm-btns">
      <span class="hexwrap"><button class="hex white" id="zmClose">닫기</button></span>
      <span class="hexwrap"><button class="hex fill" id="zmEnter">입장하기</button></span>
    </div>
  </div></div></div>
</div>

<div id="toast"></div>

     1) https://console.firebase.google.com 접속 → 프로젝트 만들기 (이름 자유)

  /* ── 실내 공간 크기 ──
     기본값: 실내 그리드 = 건물 크기(w×h) × INDOOR_SCALE (픽셀 수)

  INDOOR_SCALE: 2,

     · BASE_PIXEL_SIZE: 줌 표시(100%) 기준이 되는 픽셀 한 칸의 크기(px). */
  PIXEL_ZOOM: 6,

  BASE_PIXEL_SIZE: 3,

  /* 다른 사람이 바꾼 픽셀을 확인하는 주기(ms) — 바뀐 청크만 다시 불러옵니다 */
  SYNC_MS: 10000,
};
/* ════════════════════════════════════════════════════════════════
   설정 끝 — 아래는 수정할 필요 없습니다
   ════════════════════════════════════════════════════════════════ */

const CHUNK = 32;
const GRID_LINE_ZOOM = 14;
const MAX_ZOOM = Math.max(8, CONFIG.MAX_PIXEL_SIZE || 64);
const ERASER = 'ERASE';
const PALETTE = ['#000000','#3C3C3C','#787878','#D2D2D2','#FFFFFF','#600018',
'#ED1C24','#FF7F27','#F6AB09','#F9DD3B','#FFFABC','#0EB968','#13E67B','#87FF5E',
'#0C816E','#10AEA6','#13E1BE','#60F7F2','#28509E','#4093E4','#6B50F6','#99B1FB',
'#780C99','#AA38B9','#E09FF9','#CB007A','#EC1F80','#F38DA9','#684634','#95682A','#F8B277'];
const IS_TOUCH = matchMedia('(pointer:coarse)').matches;

/* ══════════════ 저장소 어댑터 (Firebase → Claude → 로컬 순서) ══════════════ */
const store = (()=>{
  const FB = (CONFIG.FIREBASE_URL || '').trim().replace(/\/+$/,'');
  if(FB){
    return {
      mode:'firebase',
      async get(k){
        try{
          const r = await fetch(`${FB}/kv/${k}.json`);
          if(!r.ok) return null;
          const v = await r.json();
          return v == null ? null : String(v);
        }catch(e){ return null; }
      },
      async set(k, v){
        try{
          await fetch(`${FB}/kv/${k}.json`, { method:'PUT', body: JSON.stringify(v) });
          return true;
        }catch(e){ return null; }
      }
    };
  }
  if(typeof window !== 'undefined' && window.storage && window.storage.get){
    return {
      mode:'claude',
      async get(k){ try{ const r = await window.storage.get(k, true); return r ? r.value : null; }catch(e){ return null; } },
      async set(k, v){ try{ await window.storage.set(k, v, true); return true; }catch(e){ return null; } }
    };
  }
  return {
    mode:'local',
    async get(k){ const v = localStorage.getItem('kplace_'+k); return v == null ? null : v; },
    async set(k, v){ try{ localStorage.setItem('kplace_'+k, v); return true; }catch(e){ return null; } }
  };
})();
const sGet = k => store.get(k);
const sSet = (k,v) => store.set(k,v);

/* ══════════════ 상태 ══════════════ */
let view = { mode:'out', zoneId:null, floor:1, scale:3, ox:0, oy:0 };
let chunkCache = new Map();
let pendingLoad = new Set();
let writeQueue = new Map();
let bgImages = new Map();
let selColor = PALETTE[0];
let hoverCell = null;
let painting = false;
let paintBuffer = new Map();
let lastPaintCell = null;
let pendingZone = null;
let pointers = new Map(), dragStart = null, pinchDist = 0, pinchCenter = null, moved = 0;

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const $ = id => document.getElementById(id);

/* ══════════════ 그리드 정보 ══════════════ */
function curZone(){ return CONFIG.ZONES.find(z=>z.id===view.zoneId) || null; }
function curGrid(){
  if(view.mode === 'out') return { w: CONFIG.GRID_W, h: CONFIG.GRID_H };
  const z = curZone();
  if(!z) return { w: 64, h: 36 };
  /* 실내 공간 크기: indoorW/indoorH가 지정되어 있으면 그 값을,
     없으면 건물 크기 × INDOOR_SCALE을 사용 */
  return {
    w: Math.max(8, Math.round(z.indoorW || z.w*CONFIG.INDOOR_SCALE)),
    h: Math.max(8, Math.round(z.indoorH || z.h*CONFIG.INDOOR_SCALE))
  };
}
function chunkPrefix(){
  return view.mode==='out' ? 'px_out' : `px_${view.zoneId}_${view.floor}`;
}
function curBgSvg(){
  if(view.mode==='out') return CONFIG.BACKGROUND_SVG;
  const z = curZone();
  if(z && z.floorSvg && z.floorSvg[view.floor]) return z.floorSvg[view.floor];
  return '';
}
function bgKey(){ return view.mode==='out' ? 'bg_out' : `bg_${view.zoneId}_${view.floor}`; }

/* ══════════════ 좌표 변환 ══════════════ */
function w2s(wx, wy){ return [(wx - view.ox) * view.scale, (wy - view.oy) * view.scale]; }
function s2w(sx, sy){ return [sx / view.scale + view.ox, sy / view.scale + view.oy]; }

function fitView(){
  const g = curGrid();
  const s = Math.min(cv.width / g.w, cv.height / g.h) * 0.92;
  view.scale = Math.max(0.5, s);
  view.ox = g.w/2 - cv.width/(2*view.scale);
  view.oy = g.h/2 - cv.height/(2*view.scale);
}

/* ══════════════ 청크 로딩 ══════════════ */
function visibleChunkKeys(){
  const g = curGrid();
  const [x0,y0] = s2w(0,0), [x1,y1] = s2w(cv.width, cv.height);
  const c0x = Math.max(0, Math.floor(x0/CHUNK)), c0y = Math.max(0, Math.floor(y0/CHUNK));
  const c1x = Math.min(Math.ceil(g.w/CHUNK)-1, Math.floor(x1/CHUNK));
  const c1y = Math.min(Math.ceil(g.h/CHUNK)-1, Math.floor(y1/CHUNK));
  const keys = [];
  for(let cy=c0y; cy<=c1y; cy++) for(let cx=c0x; cx<=c1x; cx++)
    keys.push(`${chunkPrefix()}_${cx}_${cy}`);
  return keys;
}
function ensureVisibleChunks(){
  if(view.scale < CONFIG.PIXEL_ZOOM) return;
  for(const k of visibleChunkKeys()){
    if(!chunkCache.has(k) && !pendingLoad.has(k)) loadChunk(k);
  }
}
async function loadChunk(key, ver){
  pendingLoad.add(key);
  const raw = await sGet(key);
  let data = {};
  if(raw){ try{ data = JSON.parse(raw); }catch(e){} }
  chunkCache.set(key, { data, canvas: buildChunkCanvas(data), loadedAt: Date.now(), ver: ver||null });
  pendingLoad.delete(key);
}
function buildChunkCanvas(data){
  const c = document.createElement('canvas'); c.width = CHUNK; c.height = CHUNK;
  const x = c.getContext('2d');
  for(const k in data){
    const [px,py] = k.split(',').map(Number);
    x.fillStyle = data[k]; x.fillRect(px, py, 1, 1);
  }
  return c;
}

/* ── 변경분만 동기화: 인덱스 키 하나만 읽어 바뀐 청크만 재로딩 ── */
setInterval(async ()=>{
  if(view.scale < CONFIG.PIXEL_ZOOM) return;
  const raw = await sGet('idx_' + chunkPrefix());
  if(!raw) return;
  let idx = {};
  try{ idx = JSON.parse(raw); }catch(e){ return; }
  for(const k of visibleChunkKeys()){
    const e = chunkCache.get(k);
    if(e && idx[k] && e.ver !== idx[k] && !pendingLoad.has(k)){
      loadChunk(k, idx[k]);
    }
  }
}, CONFIG.SYNC_MS);

function bumpIdx(prefix, keys){
  const ik = 'idx_' + prefix;
  const prev = writeQueue.get(ik) || Promise.resolve();
  const job = prev.then(async ()=>{
    const raw = await sGet(ik);
    let idx = {};
    if(raw){ try{ idx = JSON.parse(raw); }catch(e){} }
    const t = Date.now();
    keys.forEach(k=> idx[k] = t);
    await sSet(ik, JSON.stringify(idx));
    keys.forEach(k=>{ const e = chunkCache.get(k); if(e) e.ver = t; });
  });
  writeQueue.set(ik, job);
  return job;
}

/* ══════════════ 페인트 모드 ══════════════ */
function paintCell(wx, wy){
  const g = curGrid();
  const x = Math.floor(wx), y = Math.floor(wy);
  if(x<0||y<0||x>=g.w||y>=g.h) return;
  if(view.mode==='out' && zoneAt(x+0.5, y+0.5)) return;
  paintBuffer.set(`${x},${y}`, selColor);
}
function paintLine(x0,y0,x1,y1){
  const dx = x1-x0, dy = y1-y0;
  const steps = Math.max(Math.abs(dx), Math.abs(dy), 1);
  for(let i=0;i<=steps;i++) paintCell(x0 + dx*i/steps + .0001, y0 + dy*i/steps + .0001);
}
async function saveBuffer(){
  if(paintBuffer.size === 0){ setPainting(false); return; }
  toast('저장 중...');
  const prefix = chunkPrefix();
  const byChunk = new Map();
  for(const [ck, color] of paintBuffer){
    const [x,y] = ck.split(',').map(Number);
    const cx = Math.floor(x/CHUNK), cy = Math.floor(y/CHUNK);
    const key = `${prefix}_${cx}_${cy}`;
    if(!byChunk.has(key)) byChunk.set(key, []);
    byChunk.get(key).push([`${x-cx*CHUNK},${y-cy*CHUNK}`, color]);
  }
  const jobs = [];
  for(const [key, cells] of byChunk){
    const prev = writeQueue.get(key) || Promise.resolve();
    const job = prev.then(async ()=>{
      const raw = await sGet(key);
      let data = {};
      if(raw){ try{ data = JSON.parse(raw); }catch(e){} }
      for(const [lk, color] of cells){
        if(color === ERASER) delete data[lk]; else data[lk] = color;
      }
      const ok = await sSet(key, JSON.stringify(data));
      if(ok === null) throw new Error('save-failed');
      chunkCache.set(key, { data, canvas: buildChunkCanvas(data), loadedAt: Date.now(), ver: null });
    });
    writeQueue.set(key, job);
    jobs.push(job);
  }
  try{
    await Promise.all(jobs);
    await bumpIdx(prefix, [...byChunk.keys()]);
    paintBuffer.clear();
    setPainting(false);
    toast('저장 완료!');
  }catch(e){
    toast('저장에 실패했습니다. 네트워크를 확인하고 다시 시도하세요');
  }
}
function setPainting(on){
  painting = on;
  cv.classList.toggle('painting', on);
  $('paintBtn').textContent = on ? '💾 저장' : '🖌 페인트';
  $('cancelBtn').classList.toggle('show', on);
  $('paletteWrap').classList.toggle('show', on);
}
$('paintBtn').onclick = ()=>{ painting ? saveBuffer() : setPainting(true); };
$('cancelBtn').onclick = ()=>{ paintBuffer.clear(); setPainting(false); toast('취소되었습니다'); };

/* ══════════════ 구역(건물) + 입장 모달 ══════════════ */
function zoneAt(wx, wy){
  return CONFIG.ZONES.find(z => wx>=z.x && wy>=z.y && wx<z.x+z.w && wy<z.y+z.h);
}
function openZoneModal(z){
  pendingZone = z;
  $('zmName').textContent = z.name + ` · ${z.floors}층`;
  $('zmDesc').textContent = z.desc || '';
  const ph = $('zmPhoto');
  if(z.photo){ ph.src = z.photo; ph.style.display = 'block'; }
  else ph.style.display = 'none';
  $('zoneModal').classList.add('show');
}
$('zmClose').onclick = ()=>{ $('zoneModal').classList.remove('show'); pendingZone = null; };
$('zmEnter').onclick = ()=>{
  $('zoneModal').classList.remove('show');
  if(pendingZone) enterZone(pendingZone);
  pendingZone = null;
};
$('zoneModal').onclick = e=>{ if(e.target === $('zoneModal')) $('zmClose').onclick(); };

function enterZone(z){
  view.mode = z.id; view.zoneId = z.id; view.floor = 1;
  resetArea();
}
function exitZone(){
  view.mode = 'out'; view.zoneId = null;
  resetArea();
}
function setFloor(f){
  view.floor = f;
  chunkCache.clear(); pendingLoad.clear(); paintBuffer.clear();
  if(painting) setPainting(false);
  loadBg(); updateChrome();
}
function resetArea(){
  chunkCache.clear(); pendingLoad.clear(); paintBuffer.clear();
  if(painting) setPainting(false);
  fitView(); loadBg(); updateChrome();
}

/* ══════════════ 배경 SVG ══════════════ */
function loadBg(){
  const key = bgKey();
  if(bgImages.has(key)) return;
  const txt = (curBgSvg() || '').trim();
  if(!txt){ bgImages.set(key, 'none'); return; }
  bgImages.set(key, 'loading');
  const blob = new Blob([txt], {type:'image/svg+xml'});
  const img = new Image();
  img.onload = ()=> bgImages.set(key, img);
  img.onerror = ()=> bgImages.set(key, 'none');
  img.src = URL.createObjectURL(blob);
}

/* ══════════════ 렌더링 ══════════════ */
function render(){
  const g = curGrid();
  ctx.imageSmoothingEnabled = false;

  ctx.fillStyle = '#EFEFF2';               /* 칠할 수 없는 바깥: 연한 회색 */
  ctx.fillRect(0,0,cv.width,cv.height);

  const [gx,gy] = w2s(0,0);
  const gw = g.w*view.scale, gh = g.h*view.scale;

  ctx.fillStyle = '#FFFFFF';               /* 칠하는 공간: 흰색 */
  ctx.fillRect(gx,gy,gw,gh);

  const bg = bgImages.get(bgKey());
  const hasBg = bg && bg !== 'none' && bg !== 'loading';

  if(hasBg){
    try{ ctx.drawImage(bg, gx, gy, gw, gh); }catch(e){}
  } else if(bg === 'none'){
    ctx.strokeStyle = '#E9EAF7'; ctx.lineWidth = 1;
    const step = Math.max(16, view.scale*8);
    for(let x=gx; x<=gx+gw; x+=step){ ctx.beginPath(); ctx.moveTo(x,Math.max(gy,0)); ctx.lineTo(x,Math.min(gy+gh,cv.height)); ctx.stroke(); }
    for(let y=gy; y<=gy+gh; y+=step){ ctx.beginPath(); ctx.moveTo(Math.max(gx,0),y); ctx.lineTo(Math.min(gx+gw,cv.width),y); ctx.stroke(); }
  }

  if(view.scale >= CONFIG.PIXEL_ZOOM){
    for(const k of visibleChunkKeys()){
      const e = chunkCache.get(k);
      if(!e) continue;
      const parts = k.split('_');
      const cx = +parts[parts.length-2], cy = +parts[parts.length-1];
      const [sx,sy] = w2s(cx*CHUNK, cy*CHUNK);
      ctx.drawImage(e.canvas, sx, sy, CHUNK*view.scale, CHUNK*view.scale);
    }

    if(paintBuffer.size){
      const [x0,y0]=s2w(0,0),[x1,y1]=s2w(cv.width,cv.height);
      const eraseCells = [];
      for(const [ck,color] of paintBuffer){
        const [x,y] = ck.split(',').map(Number);
        if(x<x0-1||x>x1||y<y0-1||y>y1) continue;
        const [sx,sy] = w2s(x,y);
        if(color === ERASER){
          eraseCells.push([sx,sy]);
        }else{
          ctx.fillStyle = color;
          ctx.fillRect(sx,sy,view.scale,view.scale);
        }
      }
      if(eraseCells.length){
        /* 지운 칸: 밑에 깔린 배경(흰 바닥 + 지도 SVG)을 그대로 다시 그려
           진짜 지워진 것처럼 미리보기 */
        ctx.save();
        ctx.beginPath();
        for(const [sx,sy] of eraseCells) ctx.rect(sx,sy,view.scale,view.scale);
        ctx.clip();
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(gx,gy,gw,gh);
        if(hasBg){ try{ ctx.drawImage(bg, gx, gy, gw, gh); }catch(e){} }
        ctx.restore();
        ctx.strokeStyle = 'rgba(46,49,146,.4)'; ctx.lineWidth = 1;
        ctx.setLineDash([3,2]);
        for(const [sx,sy] of eraseCells) ctx.strokeRect(sx+.5,sy+.5,view.scale-1,view.scale-1);
        ctx.setLineDash([]);
      }
    }

    if(painting && view.scale >= GRID_LINE_ZOOM){
      ctx.strokeStyle = 'rgba(46,49,146,0.10)'; ctx.lineWidth = 1;
      const [x0,y0]=s2w(0,0),[x1,y1]=s2w(cv.width,cv.height);
      for(let x=Math.max(0,Math.floor(x0)); x<=Math.min(g.w,Math.ceil(x1)); x++){
        const [sx]=w2s(x,0); ctx.beginPath(); ctx.moveTo(sx,Math.max(gy,0)); ctx.lineTo(sx,Math.min(gy+gh,cv.height)); ctx.stroke();
      }
      for(let y=Math.max(0,Math.floor(y0)); y<=Math.min(g.h,Math.ceil(y1)); y++){
        const [,sy]=w2s(0,y); ctx.beginPath(); ctx.moveTo(Math.max(gx,0),sy); ctx.lineTo(Math.min(gx+gw,cv.width),sy); ctx.stroke();
      }
    }

    if(painting && hoverCell && !IS_TOUCH){
      const [sx,sy] = w2s(hoverCell[0], hoverCell[1]);
      if(selColor === ERASER){
        ctx.strokeStyle = '#2E3192'; ctx.lineWidth = 2;
        ctx.setLineDash([4,3]);
        ctx.strokeRect(sx,sy,view.scale,view.scale);
        ctx.setLineDash([]);
      }else{
        ctx.fillStyle = selColor; ctx.globalAlpha = .6;
        ctx.fillRect(sx,sy,view.scale,view.scale); ctx.globalAlpha = 1;
        ctx.strokeStyle = '#2E3192'; ctx.lineWidth = 2;
        ctx.strokeRect(sx,sy,view.scale,view.scale);
      }
    }
  }

  if(view.mode==='out'){
    for(const z of CONFIG.ZONES){
      const [zx,zy] = w2s(z.x,z.y);
      const zw = z.w*view.scale, zh = z.h*view.scale;
      ctx.fillStyle = 'rgba(46,49,146,0.88)';
      ctx.fillRect(zx,zy,zw,zh);
      ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = Math.max(2, view.scale*0.25);
      ctx.strokeRect(zx,zy,zw,zh);
      const fs = Math.max(10, Math.min(zw/(z.name.length+2), zh*0.28));
      if(zw > 40 && zh > 24){
        ctx.fillStyle = '#FFFFFF'; ctx.font = `bold ${fs}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(z.name, zx+zw/2, zy+zh/2 - fs*0.35);
        ctx.globalAlpha = .8;
        ctx.font = `${fs*0.55}px sans-serif`;
        ctx.fillText(painting ? '페인트 모드에서는 입장 불가' : `터치해서 입장 · ${z.floors}층`, zx+zw/2, zy+zh/2 + fs*0.6);
        ctx.globalAlpha = 1;
        ctx.textAlign='left'; ctx.textBaseline='alphabetic';
      }
    }
  }

  ctx.strokeStyle = '#2E3192'; ctx.lineWidth = 3;
  ctx.strokeRect(gx,gy,gw,gh);

  ensureVisibleChunks();
  updateHUD();
  requestAnimationFrame(render);
}

function updateHUD(){
  $('zoomChip').textContent = Math.round(view.scale*100/(CONFIG.BASE_PIXEL_SIZE||3))+'%';
  $('coordChip').textContent = hoverCell ? `${hoverCell[0]}, ${hoverCell[1]}` : '-, -';
  const zoomedIn = view.scale >= CONFIG.PIXEL_ZOOM;
  $('paintRow').classList.toggle('show', zoomedIn);
  $('zoomHint').classList.toggle('show', !zoomedIn);
  if(!zoomedIn) $('paletteWrap').classList.remove('show');
  else if(painting) $('paletteWrap').classList.add('show');
}

function updateChrome(){
  const crumb = $('crumb'), back = $('backBtn'), tabs = $('floorTabs');
  if(view.mode==='out'){
    crumb.textContent = '전체 지도';
    back.style.display = 'none'; tabs.style.display = 'none';
  }else{
    const z = curZone();
    crumb.innerHTML = `실내 · <b>${z ? z.name : '?'}</b> ${view.floor}층`;
    back.style.display = '';
    tabs.style.display = 'flex'; tabs.innerHTML = '';
    const floors = z ? z.floors : 1;
    for(let f=1; f<=floors; f++){
      const wrap = document.createElement('span'); wrap.className = 'hexwrap';
      const b = document.createElement('button');
      b.className = 'hex ' + (f===view.floor ? 'fill' : 'soft');
      b.style.padding = '5px 16px'; b.style.fontSize = '12px';
      b.textContent = f + 'F';
      b.onclick = ()=> setFloor(f);
      wrap.appendChild(b); tabs.appendChild(wrap);
    }
  }
}

/* ══════════════ 입력 ══════════════ */
cv.addEventListener('contextmenu', e=> e.preventDefault());
cv.addEventListener('pointerdown', e=>{
  cv.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, [e.clientX, e.clientY]);
  if(pointers.size === 1){
    moved = 0;
    const [wx,wy] = s2w(e.clientX, e.clientY);
    if(painting && e.button === 0 && view.scale >= CONFIG.PIXEL_ZOOM){
      lastPaintCell = [wx,wy];
      paintCell(wx,wy);
      dragStart = null;
    }else{
      dragStart = { sx:e.clientX, sy:e.clientY, ox:view.ox, oy:view.oy };
    }
  }else if(pointers.size === 2){
    /* 두 번째 손가락이 닿으면: 그리던 선 중단, 핀치/이동으로 전환 */
    const pts = [...pointers.values()];
    pinchDist = Math.hypot(pts[0][0]-pts[1][0], pts[0][1]-pts[1][1]);
    pinchCenter = [(pts[0][0]+pts[1][0])/2, (pts[0][1]+pts[1][1])/2];
    dragStart = null; lastPaintCell = null;
  }
});
cv.addEventListener('pointermove', e=>{
  if(pointers.has(e.pointerId)) pointers.set(e.pointerId, [e.clientX, e.clientY]);
  const [wx,wy] = s2w(e.clientX, e.clientY);
  hoverCell = [Math.floor(wx), Math.floor(wy)];

  if(pointers.size === 2){
    const pts = [...pointers.values()];
    const d = Math.hypot(pts[0][0]-pts[1][0], pts[0][1]-pts[1][1]);
    const cx = (pts[0][0]+pts[1][0])/2, cy = (pts[0][1]+pts[1][1])/2;
    if(pinchDist > 0) zoomAt(cx, cy, d/pinchDist);
    if(pinchCenter){
      view.ox -= (cx - pinchCenter[0])/view.scale;
      view.oy -= (cy - pinchCenter[1])/view.scale;
    }
    pinchDist = d; pinchCenter = [cx,cy];
    return;
  }

  if(painting && lastPaintCell && (e.buttons & 1)){
    paintLine(lastPaintCell[0], lastPaintCell[1], wx, wy);
    lastPaintCell = [wx,wy];
    return;
  }
  if(painting && (e.buttons & 2)){
    if(!dragStart) dragStart = { sx:e.clientX, sy:e.clientY, ox:view.ox, oy:view.oy };
    view.ox = dragStart.ox - (e.clientX - dragStart.sx)/view.scale;
    view.oy = dragStart.oy - (e.clientY - dragStart.sy)/view.scale;
    return;
  }
  if(dragStart && e.buttons){
    const dx = e.clientX - dragStart.sx, dy = e.clientY - dragStart.sy;
    moved = Math.max(moved, Math.abs(dx)+Math.abs(dy));
    view.ox = dragStart.ox - dx/view.scale;
    view.oy = dragStart.oy - dy/view.scale;
  }
});
cv.addEventListener('pointerup', e=>{
  pointers.delete(e.pointerId);
  const [wx,wy] = s2w(e.clientX, e.clientY);
  if(!painting && moved < 6 && view.mode==='out'){
    const z = zoneAt(wx, wy);
    if(z) openZoneModal(z);
  }
  dragStart = null; lastPaintCell = null; pinchCenter = null; pinchDist = 0;
});
cv.addEventListener('pointercancel', e=>{ pointers.delete(e.pointerId); dragStart=null; lastPaintCell=null; pinchCenter=null; pinchDist=0; });
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.15 : 1/1.15);
}, {passive:false});

function zoomAt(sx, sy, factor){
  const [wx,wy] = s2w(sx,sy);
  view.scale = Math.min(MAX_ZOOM, Math.max(0.4, view.scale*factor));
  view.ox = wx - sx/view.scale;
  view.oy = wy - sy/view.scale;
}

/* ══════════════ 팔레트 ══════════════ */
const swEl = $('swatches');
function addSwatch(color, isEraser){
  const d = document.createElement('div');
  d.className = 'sw' + (isEraser ? ' eraser' : '') + (color===selColor ? ' sel' : '');
  if(!isEraser) d.style.background = color;
  else d.textContent = '⌫';
  d.title = isEraser ? '지우개' : color;
  d.onclick = ()=>{
    selColor = color;
    swEl.querySelectorAll('.sw').forEach(s=>s.classList.remove('sel'));
    d.classList.add('sel');
  };
  swEl.appendChild(d);
}
PALETTE.forEach(c=> addSwatch(c, false));
addSwatch(ERASER, true);
$('paletteHelp').textContent = IS_TOUCH
  ? '손가락으로 드래그해 색칠 · 두 손가락으로 이동/확대 · ⌫는 지우개'
  : '클릭·드래그로 색칠 · 우클릭 드래그로 이동 · ⌫는 지우개';

/* ══════════════ 기타 ══════════════ */
let toastTimer;
function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.remove('show'); void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2600);
}
function resize(){ cv.width = window.innerWidth; cv.height = window.innerHeight; }
window.addEventListener('resize', resize);
$('backBtn').onclick = exitZone;

function showShareBanner(){
  const b = $('shareBanner'), tx = $('shareBannerText');
  if(store.mode === 'local'){
    tx.innerHTML = '<b>혼자 보기 모드</b> — 픽셀이 이 브라우저에만 저장됩니다. 파일의 CONFIG에서 <b>FIREBASE_URL</b>을 설정하면 모두와 실시간 공유됩니다.';
    b.classList.add('show');
    setTimeout(()=> b.classList.remove('show'), 9000);
  }else if(store.mode === 'firebase'){
    tx.innerHTML = '<b>공유 모드</b> — Firebase에 연결되어 모두와 함께 그립니다!';
    b.classList.add('show');
    setTimeout(()=> b.classList.remove('show'), 4000);
  }
}

/* ══════════════ 시작 ══════════════ */
(function init(){
  resize();
  fitView(); loadBg(); updateChrome(); showShareBanner();
  requestAnimationFrame(render);
})();
</script>
</body>
